name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Build Linux AMD64
        run: |
          GOOS=linux GOARCH=amd64 go build -o minifier-cli-linux-amd64 .
      - name: Build Linux ARM64
        run: |
          GOOS=linux GOARCH=arm64 go build -o minifier-cli-linux-arm64 .
      - name: Build macOS AMD64
        run: |
          GOOS=darwin GOARCH=amd64 go build -o minifier-cli-darwin-amd64 .
      - name: Build macOS ARM64
        run: |
          GOOS=darwin GOARCH=arm64 go build -o minifier-cli-darwin-arm64 .
      - name: Build Windows AMD64
        run: |
          GOOS=windows GOARCH=amd64 go build -o minifier-cli-windows-amd64.exe .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            minifier-cli-linux-amd64
            minifier-cli-linux-arm64
            minifier-cli-darwin-amd64
            minifier-cli-darwin-arm64
            minifier-cli-windows-amd64.exe
          generate_release_notes: true
